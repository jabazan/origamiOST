<style>:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#eeedea;--border:#dddbd4;
  --text:#1a1917;--text2:#5c5a54;--text3:#9e9b93;
  --green-bg:#e8f5e0;--green-bd:#7bc85a;--green-tx:#2d6b0e;--green-dk:#1a4a06;
  --red-bg:#fdecea;--red-bd:#e87b6a;--red-tx:#8b1f10;
  --amber-bg:#fdf3e0;--amber-bd:#d4a248;--amber-tx:#7a4a08;
  --gray-bg:#edece8;--gray-bd:#b0ada5;--gray-tx:#4a4844;
  --accent:#2a52d4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;display:flex;flex-direction:column;height:100vh}
.app-hdr{background:var(--text);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.app-title{font-size:15px;font-weight:600;letter-spacing:-.01em}
.app-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.prog-wrap{display:flex;align-items:center;gap:8px}
.pbar{width:140px;height:4px;background:rgba(255,255,255,.2);border-radius:99px}
.pfill{height:4px;background:#7bc85a;border-radius:99px;transition:width .4s}
.plbl{font-size:11px;color:rgba(255,255,255,.6);font-variant-numeric:tabular-nums;white-space:nowrap}
.client-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.cf{display:flex;flex-direction:column;gap:2px}
.cl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.ci{padding:5px 8px;font-size:13px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-family:inherit}
.ci:focus{outline:none;border-color:var(--accent);background:#fff}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:1px;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 12px;font-size:13px;color:var(--text2);cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;font-family:inherit}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);font-weight:500;border-bottom-color:var(--accent)}
.tbadge{padding:1px 5px;border-radius:99px;font-size:10px;background:var(--surface2);color:var(--text3);font-variant-numeric:tabular-nums}
.tbadge.gap{background:var(--red-bg);color:var(--red-tx)}
.tbadge.done{background:var(--green-bg);color:var(--green-tx)}
.filter-bar{padding:9px 20px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
.srch{padding:5px 9px;font-size:13px;border:1px solid var(--border);border-radius:99px;background:var(--bg);color:var(--text);width:200px;font-family:inherit}
.srch:focus{outline:none;border-color:var(--accent);background:#fff}
.chip{padding:3px 10px;font-size:12px;border:1px solid var(--border);border-radius:99px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.chip:hover{background:var(--surface2)}
.chip.on{background:var(--text);color:#fff;border-color:var(--text)}
.main-layout{display:flex;flex:1;overflow:hidden}
.content{padding:18px 20px;flex:1;overflow-y:auto}
.std-panel{width:35%;background:var(--surface);border-left:1px solid var(--border);padding:18px;overflow-y:auto;display:none;flex-direction:column;box-shadow:-2px 0 8px rgba(0,0,0,.08)}
.std-panel.active{display:flex}
.std-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.std-panel-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.std-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.std-close:hover{color:var(--text)}
.std-qid{font-size:11px;color:var(--text3);margin-bottom:8px;font-family:monospace;padding:6px;background:var(--surface2);border-radius:4px}
.std-func{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.std-txt{font-size:13px;color:var(--text);line-height:1.5}
@media(max-width:1024px){.main-layout{flex-direction:column}.std-panel{width:100%;border-left:none;border-top:1px solid var(--border)}}

.sec-skip{background:var(--surface2);border:1px dashed var(--border);border-radius:7px;padding:7px 11px;font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}

<script>
// Credenciales de Notion se cargan desde el servidor a través del proxy
// window.NOTION_PROXY_URL será inyectado por server.js

let Q_MAP = {};

// Función para cargar Q_MAP desde Notion
async function loadQMapFromNotion() {
  const loadIndicator = document.getElementById('load-indicator');
  if (loadIndicator) loadIndicator.style.display = 'block';

  try {
    // Intentar desde caché
    const cached = localStorage.getItem('Q_MAP_CACHE');
    const timestamp = localStorage.getItem('Q_MAP_CACHE_TIME');
    if (cached && timestamp && Date.now() - parseInt(timestamp) < 3600000) {
      Q_MAP = JSON.parse(cached);
      console.log('Q_MAP desde caché');
      return;
    }

    // Fetch desde Notion
    let cursor = undefined;
    const allPages = [];
    let hasMore = true;

    while (hasMore) {
      // Usar proxy del servidor (necesario para evitar exponer el token)
      if (!window.NOTION_PROXY_URL) {
        throw new Error('Servidor proxy de Notion no disponible');
      }

      const url = window.NOTION_PROXY_URL;
      const headers = { 'Content-Type': 'application/json' };

      const res = await fetch(url, {
        method: 'POST',
        headers,
        body: JSON.stringify({ start_cursor: cursor, page_size: 100 })
      });

      if (!res.ok) throw new Error(`Notion API: ${res.statusText}`);

      const data = await res.json();
      console.log('📦 Respuesta de Notion:', { resultCount: data.results?.length || 0, hasMore: data.has_more });
      if (data.results && data.results.length > 0) {
        console.log('📄 Primera pregunta:', data.results[0].properties);
      }
      allPages.push(...data.results);
      hasMore = data.has_more;
      cursor = data.next_cursor;
    }

    console.log(`🔄 Total de preguntas a procesar: ${allPages.length}`);

    // Transformar datos
    const childrenMap = {};
    allPages.forEach(page => {
      const props = page.properties;
      // Buscar ID en el campo 'ID' (es title, no userDefined:ID)
      const id = props['ID']?.title?.[0]?.text?.content || '';
      if (!id) {
        console.warn('⚠️ Página sin ID:', page.id);
        return;
      }

      const getText = (field) => field?.rich_text?.map(t => t.text?.content || '').join('') || '';

      // Obtener parent ID desde 'Pregunta Padre' (es rich_text, no relation)
      const parentText = getText(props['Pregunta Padre']);

      Q_MAP[id] = {
        id,
        text: getText(props['Pregunta']),
        func: props['Función']?.select?.name || '',
        std: getText(props['Descripción Estándar']),
        parent: parentText || null,
        children: null
      };

      if (Q_MAP[id].parent && !childrenMap[Q_MAP[id].parent]) {
        childrenMap[Q_MAP[id].parent] = [];
      }
      if (Q_MAP[id].parent) {
        childrenMap[Q_MAP[id].parent].push(id);
      }
    });

    // Asignar children
    Object.entries(childrenMap).forEach(([parentId, childIds]) => {
      if (Q_MAP[parentId]) Q_MAP[parentId].children = childIds;
    });

    // Guardar en caché
    localStorage.setItem('Q_MAP_CACHE', JSON.stringify(Q_MAP));
    localStorage.setItem('Q_MAP_CACHE_TIME', Date.now().toString());

    console.log(`Q_MAP cargado: ${Object.keys(Q_MAP).length} preguntas`);
    if (Object.keys(Q_MAP).length > 0) {
      const sampleId = Object.keys(Q_MAP)[0];
      console.log(`📋 Ejemplo de pregunta [${sampleId}]:`, Q_MAP[sampleId]);
    }
  } catch (error) {
    console.error('Error cargando Notion:', error);
    const cached = localStorage.getItem('Q_MAP_CACHE');
    if (cached) {
      Q_MAP = JSON.parse(cached);
      console.warn(`Usando caché como fallback (${Object.keys(Q_MAP).length} preguntas)`);
      if (Object.keys(Q_MAP).length > 0) {
        const sampleId = Object.keys(Q_MAP)[0];
        console.log(`📋 Ejemplo desde caché [${sampleId}]:`, Q_MAP[sampleId]);
      }
    } else {
      throw error;
    }
  } finally {
    if (loadIndicator) loadIndicator.style.display = 'none';
  }
}

// Build MODS from structure + Q_MAP (will be built after Q_MAP loads)
let MODS=[];

// State
let answers={},activeMod='comercial',activeFilter='all',searchTerm='';
let shownSec={},shownGrp={};

// Helpers
function findQ(id){for(const m of MODS)for(const s of m.sections)for(const q of s.qs)if(q.id===id)return q;return null;}
function secLocked(sec){if(!sec.gate)return false;return(answers[sec.gate]||{}).status==='noaplica';}
function qHidden(q){if(!q.parent)return false;if(shownGrp[q.parent])return false;return(answers[q.parent]||{}).status==='noaplica';}
function mf(id){const s=(answers[id]||{}).status;if(activeFilter==='all')return true;if(activeFilter==='gap')return s==='gap';if(activeFilter==='dev')return s==='dev';if(activeFilter==='pending')return!s;return true;}
function ms(q){if(!searchTerm)return true;const s=searchTerm.toLowerCase();return q.text.toLowerCase().includes(s)||q.func.toLowerCase().includes(s)||(q.std||'').toLowerCase().includes(s);}
function getTotal(){let c=0;MODS.forEach(m=>m.sections.forEach(s=>{if(secLocked(s)&&!shownSec[s.title])return;s.qs.forEach(q=>{if(!qHidden(q))c++;});}));return c;}
function updateProgress(){const tot=getTotal(),ans=Object.values(answers).filter(a=>a.status).length;document.getElementById('pfill').style.width=(tot?Math.round(ans/tot*100):0)+'%';document.getElementById('plbl').textContent=ans+'/'+tot;}

// Tabs
function renderTabs(){
  const bar=document.getElementById('tabbar');
  bar.innerHTML=MODS.map(m=>{
    const allQs=m.sections.flatMap(s=>s.qs);
    const gaps=allQs.filter(q=>(answers[q.id]||{}).status==='gap').length;
    const done=allQs.filter(q=>(answers[q.id]||{}).status).length;
    const tot=allQs.length;
    const bc=gaps>0?'gap':(done===tot&&tot>0?'done':'');
    return`<button class="tab-btn${m.id===activeMod?' active':''}" onclick="switchMod('${m.id}')">${m.label}<span class="tbadge ${bc}">${done}/${tot}</span></button>`;
  }).join('')+`<button class="tab-btn" onclick="showSum()" style="margin-left:auto">📊 Resumen</button>`;
}

// Options
const OPTS=[
  {v:'standard',l:'✓ Estándar Odoo',c:'rstd'},
  {v:'gap',l:'⚠ Gap',c:'rgap'},
  {v:'dev',l:'⚙ Desarrollo',c:'rdev'},
  {v:'noaplica',l:'— No aplica',c:'rna'},
];

// Card renderer
function renderCard(q,isChild){
  const a=answers[q.id]||{};
  const cls=(isChild?'child ':'')+(a.status?'c'+a.status:'');
  const showNote=a.status&&a.status!=='noaplica';
  const stdBox='';
  return`<div class="qcard ${cls}" id="qc-${q.id}" data-qid="${q.id}" onclick="selectQuestion('${q.id}')">
  <div class="qhdr"><span class="qnum">${q.id}</span>
    <div style="flex:1"><div class="qtxt">${q.text}</div><span class="qfunc">${q.func}</span></div>
  </div>
  <div class="rads">${OPTS.map(o=>`<button class="rbtn${a.status===o.v?' '+o.c:''}" onclick="event.stopPropagation();setStatus('${q.id}','${o.v}')">${o.l}</button>`).join('')}</div>
  <div id="na-${q.id}" style="display:${showNote?'block':'none'}">
    <span class="notelbl">Notas / necesidad del cliente:</span>
    <textarea class="noteinp" id="nt-${q.id}" oninput="event.stopPropagation();saveNote('${q.id}')" placeholder="Describir la necesidad, el gap o el requerimiento de desarrollo...">${a.note||''}</textarea>
  </div>
</div>`;
}

// Section renderer
function renderSec(sec){
  const locked=secLocked(sec),forced=shownSec[sec.title];
  if(locked&&!forced){
    const gq=sec.qs.find(q=>q.id===sec.gate);
    return`<div class="sec"><div class="sec-hdr">${sec.title}</div>
      <div class="sec-skip"><span>🔒 Sección omitida porque <b>"${gq?gq.func:sec.gate}"</b> no aplica</span>
        <button onclick="shownSec[${JSON.stringify(sec.title)}]=true;renderQuestions()">Mostrar igualmente</button>
      </div></div>`;
  }
  const rendered=new Set();
  let html='',anyQ=false;
  sec.qs.forEach(q=>{
    if(rendered.has(q.id))return;
    rendered.add(q.id);
    if(q.parent&&!shownGrp[q.parent]&&(answers[q.parent]||{}).status==='noaplica')return;
    const visible=mf(q.id)&&ms(q);
    if(visible){anyQ=true;html+=renderCard(q,!!q.parent);}
    if(q.children&&q.children.length){
      const naParent=(answers[q.id]||{}).status==='noaplica';
      const childQs=q.children.map(cid=>sec.qs.find(x=>x.id===cid)||findQ(cid)).filter(Boolean);
      childQs.forEach(c=>rendered.add(c.id));
      if(naParent&&!shownGrp[q.id]){
        if(visible){anyQ=true;html+=`<div class="dep-hide">🔒 ${childQs.length} pregunta${childQs.length>1?'s':''} oculta${childQs.length>1?'s':''} porque <b>"${q.func}"</b> no aplica <button onclick="shownGrp[${JSON.stringify(q.id)}]=true;renderQuestions()">Mostrar</button></div>`;}
      }else{
        childQs.forEach(c=>{if(mf(c.id)&&ms(c)){anyQ=true;html+=renderCard(c,true);}});
      }
    }
  });
  if(!anyQ)return'';
  return`<div class="sec"><div class="sec-hdr">${sec.title}${locked&&forced?' <span style="font-size:10px;color:var(--text3);text-transform:none;letter-spacing:0">(manual)</span>':''}</div>${html}</div>`;
}

function renderQuestions(){
  const mod=MODS.find(m=>m.id===activeMod);
  if(!mod){document.getElementById('qwrap').innerHTML='';return;}
  let html='';mod.sections.forEach(s=>{html+=renderSec(s);});
  if(!html.trim())html='<div class="nores">No hay preguntas que coincidan con el filtro aplicado.</div>';
  document.getElementById('qwrap').innerHTML=html;
}

// Actions
function setStatus(qid,val){
  if(!answers[qid])answers[qid]={};
  const prev=answers[qid].status;
  answers[qid].status=val;
  const na=document.getElementById('na-'+qid);
  if(na)na.style.display=(val&&val!=='noaplica')?'block':'none';
  const c=document.getElementById('qc-'+qid);
  if(c){
    const isChild=c.classList.contains('child');
    c.className='qcard '+(isChild?'child ':'')+(val?'c'+val:'');
    const rads=c.querySelector('.rads');
    if(rads)rads.innerHTML=OPTS.map(o=>`<button class="rbtn${val===o.v?' '+o.c:''}" onclick="setStatus('${qid}','${o.v}')">${o.l}</button>`).join('');
  }
  const q=findQ(qid);
  const isSecGate=MODS.some(m=>m.sections.some(s=>s.gate===qid));
  const hasChildren=q&&q.children&&q.children.length>0;
  if((isSecGate||hasChildren)&&prev!==val)renderQuestions();
  updateProgress();renderTabs();
}

function saveNote(qid){if(!answers[qid])answers[qid]={};const el=document.getElementById('nt-'+qid);if(el)answers[qid].note=el.value;}

function switchMod(id){
  activeMod=id;
  document.getElementById('qwrap').style.display='';
  document.getElementById('sumview').style.display='none';
  renderTabs();renderQuestions();
}

function setF(f,btn){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderQuestions();
}

function doSearch(v){searchTerm=v;renderQuestions();}

// Summary
function showSum(){
  document.getElementById('qwrap').style.display='none';
  document.getElementById('sumview').style.display='block';
  let std=0,gaps=0,devs=0,tot=0;
  const glist=[],dlist=[];
  MODS.forEach(m=>m.sections.forEach(s=>s.qs.forEach(q=>{
    const a=answers[q.id]||{};if(!a.status)return;tot++;
    if(a.status==='standard')std++;
    if(a.status==='gap'){gaps++;glist.push({...q,note:a.note,mod:m.label});}
    if(a.status==='dev'){devs++;dlist.push({...q,note:a.note,mod:m.label});}
  })));
  const mkList=(list,dotCls,title)=>{
    if(!list.length)return'';
    return`<div style="margin-bottom:20px"><div class="sec-hdr">${title} (${list.length})</div><div class="glist">`
      +list.map(g=>`<div class="grow"><div class="gdot ${dotCls}"></div><div>
        <div class="gtxt">${g.text}</div>
        <div class="gmeta">${g.mod} · ${g.func}${g.note?' · '+g.note:''}</div>
        ${g.std?`<div class="gstd">Estándar: ${g.std}</div>`:''}
      </div></div>`).join('')+'</div></div>';
  };
  document.getElementById('sumview').innerHTML=
    `<div class="sumwrap"><div class="sgrid">
      <div class="scard"><div class="sn">${tot}</div><div class="sl">Respondidas</div></div>
      <div class="scard"><div class="sn ss">${std}</div><div class="sl">Estándar Odoo</div></div>
      <div class="scard"><div class="sn sg">${gaps}</div><div class="sl">Gaps</div></div>
      <div class="scard"><div class="sn sd">${devs}</div><div class="sl">Desarrollos</div></div>
    </div>
    <div class="btns">
      <button class="bpri" onclick="exportTxt()">Exportar .txt ↗</button>
      <button class="bsec" onclick="backToQ()">← Volver</button>
    </div></div>`
    +mkList(glist,'gg','Gaps identificados')
    +mkList(dlist,'gd','Desarrollos requeridos')
    +(!glist.length&&!dlist.length?'<div class="nores">Aún no hay gaps ni desarrollos identificados. Completá el relevamiento primero.</div>':'');
}

function backToQ(){
  document.getElementById('qwrap').style.display='';
  document.getElementById('sumview').style.display='none';
  renderTabs();renderQuestions();
}

// Export
function exportTxt(){
  const cl=document.getElementById('c1').value||'(sin nombre)';
  const co=document.getElementById('c2').value||'(sin nombre)';
  const dt=document.getElementById('c3').value||new Date().toLocaleDateString('es-AR');
  const ind=document.getElementById('c4').value||'(sin especificar)';
  let t='RELEVAMIENTO DE ALCANCE — ODOO v19\n'+'='.repeat(50)+'\n';
  t+=`Cliente: ${cl}\nConsultor: ${co}\nFecha: ${dt}\nRubro: ${ind}\n\n`;
  t+='RESUMEN POR MÓDULO\n'+'─'.repeat(40)+'\n';
  MODS.forEach(m=>{
    const allQ=m.sections.flatMap(s=>s.qs);
    const ans=allQ.filter(q=>(answers[q.id]||{}).status);
    if(!ans.length)return;
    const gs=ans.filter(q=>answers[q.id].status==='gap').length;
    const ds=ans.filter(q=>answers[q.id].status==='dev').length;
    const ss=ans.filter(q=>answers[q.id].status==='standard').length;
    t+=`\n${m.label.toUpperCase()}: ${ans.length} respondidas · ${ss} estándar · ${gs} gaps · ${ds} desarrollo\n`;
  });
  const dump=(label,filter)=>{
    t+='\n'+'='.repeat(50)+'\n'+label+'\n'+'─'.repeat(40)+'\n';
    MODS.forEach(m=>{
      const qs=m.sections.flatMap(s=>s.qs).filter(q=>(answers[q.id]||{}).status===filter);
      if(!qs.length)return;
      t+=`\n[${m.label}]\n`;
      qs.forEach(q=>{
        t+=`  • ${q.id}: ${q.text}\n`;
        if(q.std)t+=`    Estándar Odoo: ${q.std}\n`;
        if((answers[q.id]||{}).note)t+=`    Nota del cliente: ${answers[q.id].note}\n`;
      });
    });
  };
  dump('GAPS IDENTIFICADOS','gap');
  dump('DESARROLLOS REQUERIDOS','dev');
  const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`relevamiento_${cl.replace(/\s+/g,'_')}_${dt}.txt`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// Save / Load session
function saveState(){
  const state={
    answers,shownSec,shownGrp,
    client:{c1:document.getElementById('c1').value,c2:document.getElementById('c2').value,
            c3:document.getElementById('c3').value,c4:document.getElementById('c4').value}
  };
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const cl=document.getElementById('c1').value||'sesion';
  a.href=url;a.download=`relevamiento_${cl.replace(/\s+/g,'_')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function loadState(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const state=JSON.parse(ev.target.result);
        answers=state.answers||{};shownSec=state.shownSec||{};shownGrp=state.shownGrp||{};
        if(state.client){['c1','c2','c3','c4'].forEach(k=>{const el=document.getElementById(k);if(el&&state.client[k])el.value=state.client[k];});}
        updateProgress();renderTabs();renderQuestions();
        alert('Sesión cargada correctamente.');
      }catch(err){alert('Error al cargar el archivo.');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

function clearAll(){
  if(!confirm('¿Seguro que querés limpiar todas las respuestas?'))return;
  answers={};shownSec={};shownGrp={};
  updateProgress();renderTabs();renderQuestions();
}

// Init - Esperar a cargar Q_MAP desde Notion
function initializeApp() {
  // Construir MODS DESPUÉS de que Q_MAP esté cargado
  MODS=MODS_STRUCT.map(m=>({...m,sections:m.sections.map(s=>({...s,qs:s.qIds.map(id=>{const d=Q_MAP[id]||{text:'?',func:'?',std:'',parent:null,children:null};return{id,...d};})}))}));
  console.log('🏗️ MODS construido con', MODS.reduce((sum,m)=>sum+m.sections.length,0), 'secciones');

  document.getElementById('c3').valueAsDate=new Date();
  renderTabs();renderQuestions();updateProgress();
  document.querySelectorAll('.qcard').forEach(card=>{
    const qId=card.getAttribute('data-qid');
    if(qId) card.addEventListener('click',()=>selectQuestion(qId));
  });
}

document.addEventListener('DOMContentLoaded',()=>{
  loadQMapFromNotion().then(()=>{
    console.log('Q_MAP cargado desde Notion');
    initializeApp();
  }).catch(err=>{
    console.error('Error:', err);
    alert('Error cargando preguntas desde Notion');
  });
});

function selectQuestion(qId){
  const q=Q_MAP[qId];
  if(!q)return;
  document.getElementById('stdQid').textContent=`ID: ${qId}`;
  document.getElementById('stdFunc').textContent=q.func;
  document.getElementById('stdTxt').textContent=q.std;
  document.getElementById('stdPanel').classList.add('active');
}

function closeStdPanel(){
  document.getElementById('stdPanel').classList.remove('active');
}
