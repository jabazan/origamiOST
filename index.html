"P274":{"text": "¿Se requiere conexión con ARBA para actualizar el padrón y alícuotas mensualmente?", "func": "ARBA", "std": "La integración con ARBA para actualización automática del padrón de alícuotas de IIBB requiere un módulo de localización específico o desarrollo a medida.", "parent": "GATE_IIBB", "children": null},
"GATE_ANA":{"text": "¿La empresa utiliza contabilidad analítica para análisis de costos o centros de costo?", "func": "Contabilidad analítica", "std": "Odoo Accounting incluye Planes Analíticos y Cuentas Analíticas de forma nativa. Las líneas de factura, compra y gastos pueden imputarse a cuentas analíticas para análisis de rentabilidad.", "parent": null, "children": ["P298", "P299"]},
"P298":{"text": "¿Se utilizarán modelos de distribución analítica automáticos?", "func": "Distribución analítica", "std": "Odoo permite crear Modelos de Distribución Analítica: cuando se registra un asiento en determinada cuenta, el sistema distribuye automáticamente el importe entre cuentas analíticas según %.", "parent": "GATE_ANA", "children": null},
"P299":{"text": "¿Se definirán múltiples planes de cuentas analíticas?", "func": "Planes analíticos", "std": "Odoo soporta múltiples Planes Analíticos simultáneos (ej: un plan por área de negocio y otro por proyecto). Cada asiento puede tener distribuciones en todos los planes activos.", "parent": "GATE_ANA", "children": null},
"GATE_PRES":{"text": "¿La empresa necesita implementar un módulo de control presupuestario?", "func": "Control presupuestario", "std": "Odoo Accounting incluye el módulo de Presupuestos: permite definir montos presupuestados por cuenta analítica y período, comparando el presupuesto vs. lo ejecutado en tiempo real.", "parent": null, "children": ["P294b"]},
"P294b":{"text": "¿Sobre qué áreas o cuentas se controlará el presupuesto? ¿Con qué periodicidad?", "func": "Configuración presupuesto", "std": "Los presupuestos en Odoo se definen por Posición Presupuestaria (cuentas contables), Cuenta Analítica y período. El reporte muestra el avance % y el desvío en tiempo real.", "parent": "GATE_PRES", "children": null},
"P283":{"text": "¿Qué reportes contables se utilizarán? (ESP, EERR, EFE, Libro Mayor, Balances de Sumas y Saldos)", "func": "Reportes contables", "std": "Odoo Accounting incluye: Balance General, Estado de Resultados, Libro Mayor, Balance de Sumas y Saldos y Flujo de Efectivo. Todos configurables y exportables a PDF y Excel.", "parent": null, "children": null},
"P284":{"text": "¿Qué reportes se utilizarán para controlar cobranzas y pagos? (cuentas corrientes, vencidos, etc.)", "func": "Reportes tesorería", "std": "Odoo incluye: Aging Report de cuentas por cobrar y por pagar, estado de cuenta por cliente/proveedor, facturas vencidas y reporte de liquidez. Filtrables por período, moneda y estado.", "parent": null, "children": null},
"P285":{"text": "¿Qué información se requiere visualizar en el análisis de facturas?", "func": "Análisis facturas", "std": "El Análisis de Facturas permite visualizar en tabla dinámica: importe, impuesto, descuento, estado, vendedor, producto, cliente, período y diario. Exportable a Excel.", "parent": null, "children": null},
"P288":{"text": "¿Se requieren reportes personalizados que no existen en el estándar de Odoo?", "func": "Reportes personalizados", "std": "Odoo permite crear reportes personalizados usando el motor de análisis nativo o mediante módulos de BI como Odoo Spreadsheets o integraciones con Power BI.", "parent": null, "children": null},
"GATE_PRO":{"text": "¿La empresa gestiona proyectos y desea utilizar el módulo de Proyectos de Odoo?", "func": "Módulo proyectos", "std": "Odoo Project gestiona proyectos con tableros Kanban, vistas de Gantt, lista y calendario. Incluye seguimiento de tareas, comunicación, adjuntos y dependencias entre tareas.", "parent": null, "children": null},
"P323":{"text": "¿Qué tipo de proyectos gestionan? (internos, de cliente, por contrato, etc.)", "func": "Tipo proyectos", "std": "Cada proyecto puede configurarse como interno o de cliente (vinculado a una cuenta y facturable). Los proyectos de cliente se integran con Ventas para la facturación.", "parent": null, "children": null},
"P324":{"text": "¿Qué herramientas o sistemas utilizan actualmente para gestionar proyectos?", "func": "Herramientas actuales", "std": "Odoo Project reemplaza herramientas como Trello, Asana o MS Project. Tiene Kanban, Gantt (con dependencias), lista, calendario y tablero de actividades integrado al ERP.", "parent": null, "children": null},
"P325":{"text": "¿Qué nivel de acceso deberían tener los diferentes roles dentro del módulo?", "func": "Permisos", "std": "Odoo permite configurar la visibilidad del proyecto: público, privado (solo miembros invitados) o interno (todos los empleados). Los permisos de edición se controlan por rol.", "parent": null, "children": null},
"P327":{"text": "¿Necesitan almacenar documentos relacionados con el proyecto en Odoo?", "func": "Adjuntos", "std": "Cada tarea y proyecto permite adjuntar archivos (PDF, imágenes, hojas de cálculo). También se integra con Google Drive y OneDrive para documentos externos.", "parent": null, "children": null},
"P330":{"text": "¿Cuáles son las etapas que utilizan dentro de los proyectos? ¿Cada proyecto tiene sus propias etapas?", "func": "Etapas", "std": "En Odoo, las etapas de tareas pueden ser compartidas entre proyectos o específicas de cada uno. Se configuran desde el tablero Kanban arrastrando y soltando columnas.", "parent": null, "children": null},
"P331":{"text": "¿Cómo desean organizar los proyectos? (por clientes, equipos, categoría, etc.)", "func": "Organización", "std": "Los proyectos se organizan con etiquetas, por cliente, por responsable y por favoritos. La vista de lista y el agrupamiento permiten organizar por cualquier campo del proyecto.", "parent": null, "children": null},
"P332":{"text": "¿En la gestión trabajan con hitos, tareas y subtareas?", "func": "Hitos y tareas", "std": "Odoo Project soporta Hitos (Milestones) como objetivos con fecha límite, tareas principales y subtareas. Los hitos se muestran en el Gantt como puntos de control del proyecto.", "parent": null, "children": null},
"P338":{"text": "¿Necesitan que al vender un producto se dispare automáticamente un proyecto o una tarea?", "func": "Automatización", "std": "Odoo permite configurar productos de tipo Servicio que al venderse generan automáticamente un proyecto o una tarea dentro de un proyecto existente.", "parent": null, "children": null},
"P340":{"text": "¿Existen tareas recurrentes en los proyectos que deban crearse más de una vez?", "func": "Tareas recurrentes", "std": "Odoo permite configurar tareas recurrentes con frecuencia diaria, semanal, mensual o personalizada. La tarea se crea automáticamente al llegar la fecha configurada.", "parent": null, "children": null},
"P341":{"text": "¿Cómo se asignan los recursos a las tareas? (empleados individuales, equipos)", "func": "Asignación recursos", "std": "Las tareas en Odoo pueden asignarse a uno o varios usuarios. El módulo de Planificación (Planning) complementa la asignación con una vista de capacidad por empleado.", "parent": null, "children": null},
"P342":{"text": "¿Es importante controlar la carga de horas de trabajo de los recursos?", "func": "Hojas de horas", "std": "Odoo Timesheets permite registrar horas por tarea y proyecto. Los empleados cargan su tiempo desde la tarea, la app móvil o el timer. El módulo integra con nómina y facturación.", "parent": null, "children": null},
"P335":{"text": "¿Es importante la integración con contabilidad para facturar horas o hitos del proyecto?", "func": "Integración contable", "std": "Odoo integra Proyectos con Ventas y Facturación. Se puede facturar por horas registradas (tiempo y material), por hitos alcanzados o por precio fijo, todo desde la misma orden de venta.", "parent": null, "children": ["P337", "P343"]},
"P337":{"text": "¿Se utilizan cuentas analíticas para imputar las horas trabajadas?", "func": "Analítica", "std": "Odoo Timesheets permite imputar las horas a cuentas analíticas automáticamente. Esto permite analizar el costo real de los proyectos vs. el presupuesto analítico asignado.", "parent": "P335", "children": null},
"P343":{"text": "¿Cómo se gestionará la facturación de proyectos? (por hora, por hito, precio fijo)", "func": "Modelo facturación", "std": "Odoo soporta tres modelos: Precio Fijo (factura al cerrar), Tiempo y Material (factura las horas registradas) y por Hitos (factura al aprobar cada hito del proyecto).", "parent": "P335", "children": null},
"P344":{"text": "¿Qué información desean rastrear sobre el progreso de proyectos? (costos, tiempos, tareas completadas, etc.)", "func": "Reportes", "std": "Odoo Project incluye reportes de avance de tareas, horas registradas vs. estimadas, rentabilidad del proyecto (ingresos vs. costos de horas y materiales) y KPIs configurables.", "parent": null, "children": null},
"GATE_MAN":{"text": "¿La empresa realiza mantenimiento de equipos, maquinaria o activos propios?", "func": "Módulo mantenimiento", "std": "Odoo Maintenance gestiona solicitudes de mantenimiento correctivo y calendarios de mantenimiento preventivo. Se integra con los Centros de Trabajo de Fabricación.", "parent": null, "children": null},
"P214":{"text": "¿Realizan mantenimientos internos o también envían equipos a reparar externamente?", "func": "Tipo mantenimiento", "std": "Odoo Maintenance soporta mantenimiento interno (asignado a técnicos propios) y solicitudes a proveedores externos. En ambos casos se registra el costo de la intervención.", "parent": null, "children": null},
"P215":{"text": "¿Cómo es la gestión actual? ¿Qué información se registra sobre cada intervención?", "func": "Proceso actual", "std": "Las Solicitudes de Mantenimiento registran: equipo, tipo, descripción del problema, técnico responsable, fecha solicitada, fecha de resolución y costo de la intervención.", "parent": null, "children": null},
"P216":{"text": "¿Trabajan con etapas en el proceso de mantenimiento? (nuevo, en progreso, completado, etc.)", "func": "Etapas", "std": "El módulo usa un tablero Kanban con etapas configurables. Por defecto incluye: Nueva Solicitud, En Progreso y Reparado. Se pueden agregar o modificar etapas libremente.", "parent": null, "children": null},
"P220":{"text": "¿Cuáles serán los roles de usuario y sus funciones dentro del módulo?", "func": "Permisos", "std": "Odoo Maintenance tiene dos roles: Usuario (puede crear solicitudes) y Administrador (configura equipos, crea órdenes de mantenimiento preventivo y accede a reportes).", "parent": null, "children": null},
"P224":{"text": "¿Es necesario asignar prioridad a las solicitudes de mantenimiento?", "func": "Prioridad", "std": "Las solicitudes tienen un campo de prioridad (Normal, Urgente) y una calificación de 1 a 3 estrellas para categorizar la criticidad de la intervención.", "parent": null, "children": null},
"P225":{"text": "¿Se realizan mantenimientos preventivos periódicos sobre los mismos equipos?", "func": "Mantenimiento preventivo", "std": "Odoo Maintenance permite configurar calendarios de Mantenimiento Preventivo por equipo, con frecuencia configurable. Las solicitudes se generan automáticamente al llegar la fecha.", "parent": null, "children": null},
"P227":{"text": "¿Utilizan número de serie para identificar los equipos a mantener?", "func": "Nro. serie equipos", "std": "Los Equipos en Odoo Maintenance tienen un campo de Número de Serie para identificación única. También se puede vincular a un Número de Serie de Inventario si el equipo fue comprado por Odoo.", "parent": null, "children": null},
"P228":{"text": "¿Necesitan llevar un registro de todos los activos y herramientas sobre los que hacen mantenimiento?", "func": "Registro activos", "std": "El módulo de Equipos crea un registro de cada equipo con: nombre, categoría, modelo, fabricante, número de serie, fecha de compra y empleado responsable.", "parent": null, "children": null},
"P229":{"text": "¿Tienen diferentes centros de trabajo o áreas de mantenimiento?", "func": "Centros trabajo", "std": "Los equipos se pueden asignar a un Centro de Trabajo. Al solicitar mantenimiento de ese equipo, el sistema registra automáticamente el tiempo que el centro estuvo inoperativo.", "parent": null, "children": null},
"P230":{"text": "¿Necesitan integrar el módulo de mantenimiento con el de fabricación?", "func": "Integración fabricación", "std": "Odoo integra Maintenance con Manufacturing de forma nativa. Desde un Centro de Trabajo se puede crear una solicitud de mantenimiento. El equipo inoperativo aparece en la planificación.", "parent": null, "children": null},
"P231":{"text": "¿Necesitan registrar las horas trabajadas en cada solicitud de mantenimiento? (puede requerir desarrollo)", "func": "Horas trabajadas", "std": "En el estándar de Odoo, las solicitudes de mantenimiento no tienen registro detallado de horas por técnico. Para este nivel de detalle se requiere integración con Timesheets o desarrollo.", "parent": null, "children": null},
"P232":{"text": "¿Qué reportes se necesitan sobre los mantenimientos realizados? (por equipo, técnico, costo, etc.)", "func": "Reportes", "std": "Odoo Maintenance incluye el análisis de solicitudes filtrable por equipo, técnico, tipo (correctivo/preventivo) y período. También muestra el MTBF (tiempo medio entre fallos) por equipo.", "parent": null, "children": null},
"GATE_REP":{"text": "¿La empresa realiza reparaciones de productos pertenecientes a sus clientes?", "func": "Módulo reparaciones", "std": "Odoo Repairs gestiona órdenes de reparación: registro del producto, diagnóstico, piezas utilizadas, mano de obra, facturación al cliente y control del stock de repuestos.", "parent": null, "children": null},
"P314":{"text": "¿Cómo es el proceso actual cuando ingresa un producto a reparar?", "func": "Proceso", "std": "El flujo estándar es: crear orden, diagnóstico, agregar piezas y mano de obra, confirmar, iniciar (consume piezas del stock), completar y facturar al cliente.", "parent": null, "children": null},
"P315":{"text": "¿Utilizan número de serie para identificar los productos a reparar?", "func": "Nro. serie", "std": "Odoo Repairs permite asociar el producto a reparar con su Número de Serie de inventario. Esto vincula la reparación al historial de movimientos del producto específico.", "parent": null, "children": null},

// Build MODS from structure + Q_MAP
const MODS=MODS_STRUCT.map(m=>({...m,sections:m.sections.map(s=>({...s,qs:s.qIds.map(id=>{const d=Q_MAP[id]||{text:'?',func:'?',std:'',parent:null,children:null};return{id,...d};})}))}));

// State
let answers={},activeMod='comercial',activeFilter='all',searchTerm='';
let shownSec={},shownGrp={};

// Helpers
function findQ(id){for(const m of MODS)for(const s of m.sections)for(const q of s.qs)if(q.id===id)return q;return null;}
function secLocked(sec){if(!sec.gate)return false;return(answers[sec.gate]||{}).status==='noaplica';}
function qHidden(q){if(!q.parent)return false;if(shownGrp[q.parent])return false;return(answers[q.parent]||{}).status==='noaplica';}
function mf(id){const s=(answers[id]||{}).status;if(activeFilter==='all')return true;if(activeFilter==='gap')return s==='gap';if(activeFilter==='dev')return s==='dev';if(activeFilter==='pending')return!s;return true;}
function ms(q){if(!searchTerm)return true;const s=searchTerm.toLowerCase();return q.text.toLowerCase().includes(s)||q.func.toLowerCase().includes(s)||(q.std||'').toLowerCase().includes(s);}
function getTotal(){let c=0;MODS.forEach(m=>m.sections.forEach(s=>{if(secLocked(s)&&!shownSec[s.title])return;s.qs.forEach(q=>{if(!qHidden(q))c++;});}));return c;}
function updateProgress(){const tot=getTotal(),ans=Object.values(answers).filter(a=>a.status).length;document.getElementById('pfill').style.width=(tot?Math.round(ans/tot*100):0)+'%';document.getElementById('plbl').textContent=ans+'/'+tot;}

// Tabs
function renderTabs(){
  const bar=document.getElementById('tabbar');
  bar.innerHTML=MODS.map(m=>{
    const allQs=m.sections.flatMap(s=>s.qs);
    const gaps=allQs.filter(q=>(answers[q.id]||{}).status==='gap').length;
    const done=allQs.filter(q=>(answers[q.id]||{}).status).length;
    const tot=allQs.length;
    const bc=gaps>0?'gap':(done===tot&&tot>0?'done':'');
    return`<button class="tab-btn${m.id===activeMod?' active':''}" onclick="switchMod('${m.id}')">${m.label}<span class="tbadge ${bc}">${done}/${tot}</span></button>`;
  }).join('')+`<button class="tab-btn" onclick="showSum()" style="margin-left:auto">📊 Resumen</button>`;
}

// Options
const OPTS=[
  {v:'standard',l:'✓ Estándar Odoo',c:'rstd'},
  {v:'gap',l:'⚠ Gap',c:'rgap'},
  {v:'dev',l:'⚙ Desarrollo',c:'rdev'},
  {v:'noaplica',l:'— No aplica',c:'rna'},
];

// Card renderer
function renderCard(q,isChild){
  const a=answers[q.id]||{};
  const cls=(isChild?'child ':'')+(a.status?'c'+a.status:'');
  const showNote=a.status&&a.status!=='noaplica';
  const stdBox=q.std?`<div class="std-box"><div class="std-lbl">Estándar Odoo v19</div><div class="std-txt">${q.std}</div></div>`:'';
  return`<div class="qcard ${cls}" id="qc-${q.id}">
  <div class="qhdr"><span class="qnum">${q.id}</span>
    <div style="flex:1"><div class="qtxt">${q.text}</div><span class="qfunc">${q.func}</span></div>
  </div>
  ${stdBox}
  <div class="rads">${OPTS.map(o=>`<button class="rbtn${a.status===o.v?' '+o.c:''}" onclick="setStatus('${q.id}','${o.v}')">${o.l}</button>`).join('')}</div>
  <div id="na-${q.id}" style="display:${showNote?'block':'none'}">
    <span class="notelbl">Notas / necesidad del cliente:</span>
    <textarea class="noteinp" id="nt-${q.id}" oninput="saveNote('${q.id}')" placeholder="Describir la necesidad, el gap o el requerimiento de desarrollo...">${a.note||''}</textarea>
  </div>
</div>`;
}

// Section renderer
function renderSec(sec){
  const locked=secLocked(sec),forced=shownSec[sec.title];
  if(locked&&!forced){
    const gq=sec.qs.find(q=>q.id===sec.gate);
    return`<div class="sec"><div class="sec-hdr">${sec.title}</div>
      <div class="sec-skip"><span>🔒 Sección omitida porque <b>"${gq?gq.func:sec.gate}"</b> no aplica</span>
        <button onclick="shownSec[${JSON.stringify(sec.title)}]=true;renderQuestions()">Mostrar igualmente</button>
      </div></div>`;
  }
  const rendered=new Set();
  let html='',anyQ=false;
  sec.qs.forEach(q=>{
    if(rendered.has(q.id))return;
    rendered.add(q.id);
    if(q.parent&&!shownGrp[q.parent]&&(answers[q.parent]||{}).status==='noaplica')return;
    const visible=mf(q.id)&&ms(q);
    if(visible){anyQ=true;html+=renderCard(q,!!q.parent);}
    if(q.children&&q.children.length){
      const naParent=(answers[q.id]||{}).status==='noaplica';
      const childQs=q.children.map(cid=>sec.qs.find(x=>x.id===cid)||findQ(cid)).filter(Boolean);
      childQs.forEach(c=>rendered.add(c.id));
      if(naParent&&!shownGrp[q.id]){
        if(visible){anyQ=true;html+=`<div class="dep-hide">🔒 ${childQs.length} pregunta${childQs.length>1?'s':''} oculta${childQs.length>1?'s':''} porque <b>"${q.func}"</b> no aplica <button onclick="shownGrp[${JSON.stringify(q.id)}]=true;renderQuestions()">Mostrar</button></div>`;}
      }else{
        childQs.forEach(c=>{if(mf(c.id)&&ms(c)){anyQ=true;html+=renderCard(c,true);}});
      }
    }
  });
  if(!anyQ)return'';
  return`<div class="sec"><div class="sec-hdr">${sec.title}${locked&&forced?' <span style="font-size:10px;color:var(--text3);text-transform:none;letter-spacing:0">(manual)</span>':''}</div>${html}</div>`;
}

function renderQuestions(){
  const mod=MODS.find(m=>m.id===activeMod);
  if(!mod){document.getElementById('qwrap').innerHTML='';return;}
  let html='';mod.sections.forEach(s=>{html+=renderSec(s);});
  if(!html.trim())html='<div class="nores">No hay preguntas que coincidan con el filtro aplicado.</div>';
  document.getElementById('qwrap').innerHTML=html;
}

// Actions
function setStatus(qid,val){
  if(!answers[qid])answers[qid]={};
  const prev=answers[qid].status;
  answers[qid].status=val;
  const na=document.getElementById('na-'+qid);
  if(na)na.style.display=(val&&val!=='noaplica')?'block':'none';
  const c=document.getElementById('qc-'+qid);
  if(c){
    const isChild=c.classList.contains('child');
    c.className='qcard '+(isChild?'child ':'')+(val?'c'+val:'');
    const rads=c.querySelector('.rads');
    if(rads)rads.innerHTML=OPTS.map(o=>`<button class="rbtn${val===o.v?' '+o.c:''}" onclick="setStatus('${qid}','${o.v}')">${o.l}</button>`).join('');
  }
  const q=findQ(qid);
  const isSecGate=MODS.some(m=>m.sections.some(s=>s.gate===qid));
  const hasChildren=q&&q.children&&q.children.length>0;
  if((isSecGate||hasChildren)&&prev!==val)renderQuestions();
  updateProgress();renderTabs();
}

function saveNote(qid){if(!answers[qid])answers[qid]={};const el=document.getElementById('nt-'+qid);if(el)answers[qid].note=el.value;}

function switchMod(id){
  activeMod=id;
  document.getElementById('qwrap').style.display='';
  document.getElementById('sumview').style.display='none';
  renderTabs();renderQuestions();
}

function setF(f,btn){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderQuestions();
}

function doSearch(v){searchTerm=v;renderQuestions();}

// Summary
function showSum(){
  document.getElementById('qwrap').style.display='none';
  document.getElementById('sumview').style.display='block';
  let std=0,gaps=0,devs=0,tot=0;
  const glist=[],dlist=[];
  MODS.forEach(m=>m.sections.forEach(s=>s.qs.forEach(q=>{
    const a=answers[q.id]||{};if(!a.status)return;tot++;
    if(a.status==='standard')std++;
    if(a.status==='gap'){gaps++;glist.push({...q,note:a.note,mod:m.label});}
    if(a.status==='dev'){devs++;dlist.push({...q,note:a.note,mod:m.label});}
  })));
  const mkList=(list,dotCls,title)=>{
    if(!list.length)return'';
    return`<div style="margin-bottom:20px"><div class="sec-hdr">${title} (${list.length})</div><div class="glist">`
      +list.map(g=>`<div class="grow"><div class="gdot ${dotCls}"></div><div>
        <div class="gtxt">${g.text}</div>
        <div class="gmeta">${g.mod} · ${g.func}${g.note?' · '+g.note:''}</div>
        ${g.std?`<div class="gstd">Estándar: ${g.std}</div>`:''}
      </div></div>`).join('')+'</div></div>';
  };
  document.getElementById('sumview').innerHTML=
    `<div class="sumwrap"><div class="sgrid">
      <div class="scard"><div class="sn">${tot}</div><div class="sl">Respondidas</div></div>
      <div class="scard"><div class="sn ss">${std}</div><div class="sl">Estándar Odoo</div></div>
      <div class="scard"><div class="sn sg">${gaps}</div><div class="sl">Gaps</div></div>
      <div class="scard"><div class="sn sd">${devs}</div><div class="sl">Desarrollos</div></div>
    </div>
    <div class="btns">
      <button class="bpri" onclick="exportTxt()">Exportar .txt ↗</button>
      <button class="bsec" onclick="backToQ()">← Volver</button>
    </div></div>`
    +mkList(glist,'gg','Gaps identificados')
    +mkList(dlist,'gd','Desarrollos requeridos')
    +(!glist.length&&!dlist.length?'<div class="nores">Aún no hay gaps ni desarrollos identificados. Completá el relevamiento primero.</div>':'');
}

function backToQ(){
  document.getElementById('qwrap').style.display='';
  document.getElementById('sumview').style.display='none';
  renderTabs();renderQuestions();
}

// Export
function exportTxt(){
  const cl=document.getElementById('c1').value||'(sin nombre)';
  const co=document.getElementById('c2').value||'(sin nombre)';
  const dt=document.getElementById('c3').value||new Date().toLocaleDateString('es-AR');
  const ind=document.getElementById('c4').value||'(sin especificar)';
  let t='RELEVAMIENTO DE ALCANCE — ODOO v19\n'+'='.repeat(50)+'\n';
  t+=`Cliente: ${cl}\nConsultor: ${co}\nFecha: ${dt}\nRubro: ${ind}\n\n`;
  t+='RESUMEN POR MÓDULO\n'+'─'.repeat(40)+'\n';
  MODS.forEach(m=>{
    const allQ=m.sections.flatMap(s=>s.qs);
    const ans=allQ.filter(q=>(answers[q.id]||{}).status);
    if(!ans.length)return;
    const gs=ans.filter(q=>answers[q.id].status==='gap').length;
    const ds=ans.filter(q=>answers[q.id].status==='dev').length;
    const ss=ans.filter(q=>answers[q.id].status==='standard').length;
    t+=`\n${m.label.toUpperCase()}: ${ans.length} respondidas · ${ss} estándar · ${gs} gaps · ${ds} desarrollo\n`;
  });
  const dump=(label,filter)=>{
    t+='\n'+'='.repeat(50)+'\n'+label+'\n'+'─'.repeat(40)+'\n';
    MODS.forEach(m=>{
      const qs=m.sections.flatMap(s=>s.qs).filter(q=>(answers[q.id]||{}).status===filter);
      if(!qs.length)return;
      t+=`\n[${m.label}]\n`;
      qs.forEach(q=>{
        t+=`  • ${q.id}: ${q.text}\n`;
        if(q.std)t+=`    Estándar Odoo: ${q.std}\n`;
        if((answers[q.id]||{}).note)t+=`    Nota del cliente: ${answers[q.id].note}\n`;
      });
    });
  };
  dump('GAPS IDENTIFICADOS','gap');
  dump('DESARROLLOS REQUERIDOS','dev');
  const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`relevamiento_${cl.replace(/\s+/g,'_')}_${dt}.txt`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// Save / Load session
function saveState(){
  const state={
    answers,shownSec,shownGrp,
    client:{c1:document.getElementById('c1').value,c2:document.getElementById('c2').value,
            c3:document.getElementById('c3').value,c4:document.getElementById('c4').value}
  };
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const cl=document.getElementById('c1').value||'sesion';
  a.href=url;a.download=`relevamiento_${cl.replace(/\s+/g,'_')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function loadState(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const state=JSON.parse(ev.target.result);
        answers=state.answers||{};shownSec=state.shownSec||{};shownGrp=state.shownGrp||{};
        if(state.client){['c1','c2','c3','c4'].forEach(k=>{const el=document.getElementById(k);if(el&&state.client[k])el.value=state.client[k];});}
        updateProgress();renderTabs();renderQuestions();
        alert('Sesión cargada correctamente.');
      }catch(err){alert('Error al cargar el archivo.');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

function clearAll(){
  if(!confirm('¿Seguro que querés limpiar todas las respuestas?'))return;
  answers={};shownSec={};shownGrp={};
  updateProgress();renderTabs();renderQuestions();
}

// Init
document.getElementById('c3').valueAsDate=new Date();
renderTabs();renderQuestions();updateProgress();
function selectQuestion(qId){
  const q=Q_MAP[qId];
  if(!q)return;
  document.getElementById('stdQid').textContent=`ID: ${qId}`;
  document.getElementById('stdFunc').textContent=q.func;
  document.getElementById('stdTxt').textContent=q.std;
  document.getElementById('stdPanel').classList.add('active');
}

function closeStdPanel(){
  document.getElementById('stdPanel').classList.remove('active');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.qcard').forEach(card=>{
    const qId=card.getAttribute('data-qid');
    if(qId) card.addEventListener('click',()=>selectQuestion(qId));
  });
});
</script>
